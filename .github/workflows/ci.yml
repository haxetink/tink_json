name: CI

on:
  push:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.haxe-version == 'nightly' }}
    strategy:
      fail-fast: false
      matrix:
        haxe-version:
          - stable
          - nightly
        target:
          - interp
          - neko
          # - python # somehow has a time out error when running the tests
          - node
          - js
          # - lua
          - jvm
          # - cpp # TODO: figure out hxcpp
          - php
        flags:
          - ""
          - -D tink_json_compact_code
        exclude:
          - target: php
            flags: -D tink_json_compact_code # FIXME: compact code not working on php

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Cache Haxe
        uses: actions/cache@v6
        with:
          path: ~/haxe
          key: haxe

      - name: Install Lix
        uses: lix-pm/setup-lix@master

      - name: Install Haxe
        run: lix install haxe ${{ matrix.haxe-version }}

      - name: Install Haxe Libraries
        run: lix download

      - name: Run Test
        run: lix run travix ${{ matrix.target }} ${{ matrix.flags }}

  release:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/') # consider using the "release" event. see: https://docs.github.com/en/actions/reference/events-that-trigger-workflows#release

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Cache Haxe
        uses: actions/cache@v6
        with:
          path: ~/haxe
          key: haxe

      - name: Install Lix
        uses: lix-pm/setup-lix@master

      - name: Install Haxe
        run: lix install haxe stable

      - name: Install Haxe Libraries
        run: lix download

      - name: Release to Haxelib
        run: lix run travix release
        env:
          HAXELIB_AUTH: ${{ secrets.HAXELIB_AUTH }}
